name: CI

# Verify every push to main and every PR: typecheck, tests, production build.
# No secrets needed — the Firebase web config in .env.production is non-secret (it ships to the
# browser), so `vite build` works in CI as-is. This is the safety net the app lacked (no staging).

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Java is required by the Firebase Firestore emulator (it ships as a JVM JAR).
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install
        run: npm ci --cache /tmp/npm-cache

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Rules tests (Firestore emulator)
        run: npm run test:rules

      - name: Build
        run: npm run build

      - name: Dependency audit
        run: npm audit --audit-level=high || true

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
