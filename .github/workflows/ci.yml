name: CI

# Verify every push to main and every PR: typecheck, tests, production build.
# No secrets needed — the Firebase web config in .env.production is non-secret (it ships to the
# browser), so `vite build` works in CI as-is. This is the safety net the app lacked (no staging).

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
