<!doctype html>
<!--
  "What you sent" — refined (Option B, document rows). ⚠️ SPEC-DERIVED: the approved mockup was not
  supplied to the build session — reconstructed from the prose so the intent is on record. Structure/
  behaviour only; the app resolves colours from .t-f12 tokens, not this file's hex.

  Layout:
   • Manuscript header — a cover plate + title (click-to-reassign in-app) + genre · word-count.
   • "Sent by {method} · {date}" (the method is click-to-pick in-app).
   • "Sent with this query" eyebrow, then DOCUMENT ROWS, each a TypeGlyph + name + a sent-or-not pip:
       – Query letter, Synopsis  — sent-or-not (click toggles; writes materialsWanted).
       – Sample materials (renamed from "Sample chapters") — an Add/Change affordance opens a unit
         toggle (Pages / Chapters / Words) + a quantity field; on save the row reads it back
         ("3 chapters", "50 pages", "10,000 words"). Wired to QueryMaterial.type/quantity — no new
         fields. A legacy item with no unit/quantity reads "Included" (historic data preserved).
   • Submission package (PRO) — the foot row.
-->
<html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>What you sent — document rows</title>
<style>
  :root{--panel:#fffdfb;--bd:#e7ddce;--ink:#1a1512;--muted:#8f877b;--faint:#b3a596;--burg:#7c3a2a;
    --mono:'JetBrains Mono',monospace;--serif:'Playfair Display',serif;--sage:#4a5d45;--sageBg:#eef3eb;--slate:#6A89A7;}
  *{box-sizing:border-box}body{margin:0;padding:24px;background:#f3ece2;font-family:'Inter',system-ui,sans-serif;color:#3a1c14}
  .card{max-width:360px;background:var(--panel);border:1px solid var(--bd);border-radius:14px;overflow:hidden}
  .chh{display:flex;align-items:center;gap:8px;background:#f6d9d1;padding:10px 14px;font-family:var(--serif);font-weight:700;font-size:14px;color:#7c3a2a}
  .body{padding:16px 16px 18px}
  .hdr{display:flex;align-items:center;gap:12px}
  .cover{width:40px;height:52px;border-radius:4px;flex:none;background:linear-gradient(135deg,#efe6d8,#e3d5c1);border:1px solid #d8c9b3;display:grid;place-items:center}
  .title{font-family:var(--serif);font-weight:700;font-size:18px;color:var(--ink);line-height:1.15}
  .meta{font-family:var(--mono);font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-top:5px}
  .sentby{display:flex;gap:8px;font-family:var(--mono);font-size:9.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-top:12px}
  .sentby b{color:var(--ink);font-weight:400}
  .eyebrow{font-family:var(--mono);font-size:8.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin:18px 0 2px}
  .row{display:flex;align-items:center;gap:11px;width:100%;padding:11px 0;border:none;border-bottom:1px solid var(--bd);background:none;cursor:pointer;font-size:13.5px;text-align:left;color:var(--ink)}
  .row.off{color:var(--muted)}
  .row .nm{flex:1;min-width:0}.row .nm small{color:var(--muted)}
  .row svg{flex:none}
  .pip{display:inline-flex;align-items:center;gap:7px;font-family:var(--mono);font-size:8.5px;letter-spacing:.06em;text-transform:uppercase}
  .pip.on{color:var(--sage)}.pip.off{color:var(--faint)}
  .tick{width:16px;height:16px;border-radius:50%;display:grid;place-items:center;font-size:9px}
  .tick.on{background:var(--sageBg);color:var(--sage)}.tick.off{border:1.5px dashed #cfc3b1;color:transparent}
  .chg{font-family:var(--mono);font-size:8.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--burg);background:none;border:none;cursor:pointer}
  /* sample editor */
  .seg{display:flex;border:1px solid var(--bd);border-radius:8px;overflow:hidden;margin-top:11px}
  .seg button{flex:1;padding:6px 0;font-size:12px;text-transform:capitalize;border:none;cursor:pointer;background:var(--panel);color:#6b6257}
  .seg button+button{border-left:1px solid var(--bd)}
  .seg button.on{background:var(--panel);box-shadow:inset 0 0 0 1.5px var(--ink);color:var(--ink);font-weight:600} /* outline-selected, no fill */
  .qty{display:flex;gap:8px;margin-top:8px}
  .qty input{flex:1;padding:7px 10px;font-size:13px;border:1px solid var(--bd);border-radius:8px;background:var(--panel)} /* no placeholder */
  .qty .save{padding:7px 16px;font-size:12.5px;font-weight:600;color:var(--burg);background:#f5e2da;border:1px solid #e8c8bc;border-radius:8px;cursor:pointer} /* soft-pink CTA */
  .qty .cancel{padding:7px 10px;font-size:12.5px;color:var(--muted);background:none;border:none;cursor:pointer}
  /* pkg foot */
  .pkg{display:inline-flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);margin-top:14px;cursor:pointer}
  .pro{font-family:var(--mono);font-size:7.5px;letter-spacing:.1em;text-transform:uppercase;color:#fff;background:var(--slate);border-radius:6px;padding:3px 7px;margin-left:6px}
  h1{font-size:14px;margin:0 0 12px}
</style></head><body>
<h1>What you sent — document rows (spec-derived)</h1>
<div class="card">
  <div class="chh"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#7c3a2a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>What you sent</div>
  <div class="body">
    <div class="hdr">
      <div class="cover"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6f4e37" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3h11l3 3v15H5zM9 3v6l2-1 2 1V3"/></svg></div>
      <div><div class="title">The Salt Road</div><div class="meta">Historical fiction · 92,000 words</div></div>
    </div>
    <div class="sentby">Sent by <b>Email</b>&nbsp;·&nbsp;<b>1 May</b></div>

    <div class="eyebrow">Sent with this query</div>

    <button class="row"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6f4e37" stroke-width="2.4" stroke-linecap="round"><path d="M4 4h13l3 3v13H4z"/><path d="M8 9h8M8 13h8M8 17h5"/></svg><span class="nm">Query letter</span><span class="pip on">Sent<span class="tick on">✓</span></span></button>

    <button class="row off"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#b3a596" stroke-width="2.2" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h10"/></svg><span class="nm">Synopsis</span><span class="pip off" style="color:var(--burg)">Mark sent<span class="tick off">✓</span></span></button>

    <div style="padding:11px 0;border-bottom:1px solid var(--bd);font-size:13.5px">
      <div style="display:flex;align-items:center;gap:11px">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6f4e37" stroke-width="2" stroke-linejoin="round"><path d="M8 6h9a1 1 0 011 1v13a1 1 0 01-1 1H8a1 1 0 01-1-1V7a1 1 0 011-1z"/><path d="M6 17V4a1 1 0 011-1h8"/></svg>
        <span class="nm">Sample materials <small>— 3 chapters</small></span>
        <span style="display:inline-flex;gap:13px"><button class="chg">Change</button><button class="chg" style="color:var(--muted)">Remove</button></span>
      </div>
      <!-- editor (open) -->
      <div class="seg"><button>pages</button><button class="on">chapters</button><button>words</button></div>
      <div class="qty"><input value="3" aria-label="Quantity"><button class="save">Save</button><button class="cancel">Cancel</button></div>
    </div>

    <div class="pkg">＋ Attach a submission package<span class="pro">Pro</span></div>
  </div>
</div>
</body></html>
