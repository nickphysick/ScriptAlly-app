<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScriptAlly — Rail v5 across the three themes (v2)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#efeae2;color:#3a1c14;padding:34px 30px 60px}
button{font-family:inherit;cursor:pointer;background:none;border:none;color:inherit;text-align:left}
h1{font-family:'Playfair Display',serif;font-size:26px;font-weight:500;color:#5d4037}
.sub{font-size:12.5px;font-weight:300;color:#8a7a6c;margin-top:6px;max-width:720px;line-height:1.6}
.row{display:flex;gap:26px;margin-top:30px;align-items:flex-start;flex-wrap:wrap}

/* per-theme swatch backdrop */
.swatch{padding:22px;border-radius:20px;flex:none}
.vlab{font-family:'JetBrains Mono',monospace;font-size:8.5px;letter-spacing:.16em;text-transform:uppercase;margin-bottom:12px}

/* ===== shared rail structure, themed by vars ===== */
.rail{position:relative;width:264px;background:var(--card);border:var(--railbd);border-radius:16px;height:660px;
  box-shadow:var(--railsh);display:flex;flex-direction:column;overflow:hidden}
.brand{display:flex;align-items:center;gap:9px;padding:18px 20px 14px}
.monogram{width:26px;height:26px;border-radius:50%;background:#dfe7ec;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:13px;color:#3a4650}
.wordmark{font-family:'Playfair Display',serif;font-size:17px;font-weight:500;color:var(--ink)}
.cap{margin:2px 12px 8px}
.capbtn{display:flex;align-items:center;gap:9px;width:100%;background:var(--btnbg);border:var(--btnbd);color:var(--btntx);border-radius:11px;padding:10px 13px;font-size:12.5px;font-weight:500;box-shadow:var(--btnsh)}
.capbtn:hover{background:var(--btnhv)}
.capbtn svg{width:14px;height:14px;stroke:var(--accent);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.nav{padding:2px 12px;flex:1}
.eyebrow{font-family:'JetBrains Mono',monospace;font-size:7.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--label);padding:14px 10px 6px}
.item{display:flex;align-items:center;gap:10px;width:100%;padding:8px 10px;border-radius:10px;font-size:12.5px;font-weight:500;color:var(--itemtx);margin-bottom:1px}
.item svg{width:15px;height:15px;stroke:var(--accent);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;flex:none}
.item:hover{background:var(--hov)}
.item.on{background:var(--pill);color:var(--ink)}
.cap-a{display:flex;gap:7px;margin:0 12px 10px}
.cap-a button{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;background:var(--btnbg);border:var(--btnbd);border-radius:11px;padding:10px 4px 8px;box-shadow:var(--btnsh)}
.cap-a button:hover{background:var(--btnhv)}
.cap-a svg{width:15px;height:15px;stroke:var(--accent);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.cap-a .l{font-family:'JetBrains Mono',monospace;font-size:6.8px;letter-spacing:.1em;text-transform:uppercase;color:var(--btntx)}
.util{padding:6px 12px 10px;border-top:1px solid var(--hair)}
.util .item{font-size:12px;color:var(--label)}
.util .item svg{stroke:var(--label)}
.util .item:hover{color:var(--ink)}
.util .item:hover svg{stroke:var(--accent)}
.foot{border-top:1px solid var(--hair);padding:12px 18px;display:flex;align-items:center;gap:9px}
.foot .avatar{width:28px;height:28px;border-radius:50%;background:var(--pill);border:1px solid var(--avbd);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:12px;color:var(--accent)}
.foot .un{font-size:11.5px;font-weight:500;color:var(--ink)}
.foot .up{font-family:'JetBrains Mono',monospace;font-size:6.5px;letter-spacing:.12em;color:var(--label);text-transform:uppercase}

/* ===== Cappuccino ===== */
.t-capp{background:#f2ede7;
  --card:#fffefb;--hair:#e7ddd2;--ink:#3a1c14;--label:#9c8878;--accent:#7c3a2a;
  --itemtx:#5a4a40;--pill:#f1e9df;--hov:#f7f3ed;
  --railbd:1px solid #e7ddd2;--railsh:0 1px 3px rgba(58,28,20,0.05),0 12px 30px rgba(58,28,20,0.07);
  --btnbg:#ffffff;--btnbd:1px solid #ded3c2;--btntx:#5d4037;--btnhv:#f4f2ef;--btnsh:0 1px 2px rgba(58,28,20,0.05);
  --avbd:rgba(124,58,42,0.3)}
.t-capp .vlab{color:#7c3a2a}

/* ===== Bold Pastille ===== */
.t-bold{background:#c2cfda;
  --card:#fffefb;--hair:rgba(29,23,18,0.18);--ink:#1d1712;--label:#6a6560;--accent:#1d1712;
  --itemtx:#2b2622;--pill:#eec9c3;--hov:#f6efec;
  --railbd:1.5px solid #1d1712;--railsh:5px 5px 0 rgba(29,23,18,0.92);
  --btnbg:#ffffff;--btnbd:1.5px solid #1d1712;--btntx:#1d1712;--btnhv:#f8dcd8;--btnsh:2px 2px 0 rgba(29,23,18,0.85);
  --avbd:#1d1712}
.t-bold .vlab{color:#1d1712}

/* ===== Editorial ===== */
.t-edn{background:#f4f4f3;
  --card:#ffffff;--hair:#ececeb;--ink:#1a1a1a;--label:#8a8d90;--accent:#44484d;
  --itemtx:#3c3f43;--pill:#e9eaeb;--hov:#f3f3f2;
  --railbd:none;--railsh:0 1px 2px rgba(20,20,20,0.05),0 14px 36px rgba(20,20,20,0.09);
  --btnbg:#ffffff;--btnbd:1px solid #dcdcdb;--btntx:#2c2f33;--btnhv:#f3f3f2;--btnsh:0 1px 2px rgba(20,20,20,0.04);
  --avbd:rgba(68,72,77,0.35)}
.t-edn .vlab{color:#44484d}
</style>
</head>
<body>

<h1>Rail v5 · three themes</h1>
<p class="sub">Same structure, themed entirely by tokens — Cappuccino's parchment warmth, Bold Pastille's ink frames and
hard offset shadows on the blue-grey desk, Editorial's borderless graphite softness.</p>

<div class="row" id="rails"></div>

<template id="railT">
  <div class="rail">
    <div class="brand"><span class="monogram">S</span><span class="wordmark">ScriptAlly</span></div>
    <div class="cap">
      <button class="capbtn"><svg viewBox="0 0 24 24"><path d="M9 14L4 9l5-5"/><path d="M4 9h11a5 5 0 0 1 5 5v1"/></svg>+ Record a response</button>
    </div>
    <div class="nav">
      <button class="item"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Dashboard</button>
      <div class="eyebrow">Querying</div>
      <button class="item on"><svg viewBox="0 0 24 24"><path d="M21 3L10 14"/><path d="M21 3l-7 18-4-7-7-4 18-7z"/></svg>Queries Hub</button>
      <button class="item"><svg viewBox="0 0 24 24"><path d="M4 20V10M10 20V4M16 20v-8M22 20H2"/></svg>Rejection analytics</button>
      <div class="eyebrow">Agents</div>
      <button class="item"><svg viewBox="0 0 24 24"><circle cx="9" cy="8" r="3.5"/><path d="M2.5 20c0-3.6 2.9-6 6.5-6s6.5 2.4 6.5 6"/><circle cx="17.5" cy="9" r="2.5"/><path d="M16 14.5c3 .3 5.5 2.3 5.5 5.5"/></svg>Agents database</button>
      <button class="item"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>Discover new agents</button>
      <div class="eyebrow">Manuscripts</div>
      <button class="item"><svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20V3H6.5A2.5 2.5 0 0 0 4 5.5v14z"/></svg>Your manuscripts</button>
      <button class="item"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 10h18M9 4v16"/></svg>Submission packages</button>
    </div>
    <div class="cap-a">
      <button><svg viewBox="0 0 24 24"><path d="M21 3L10 14"/><path d="M21 3l-7 18-4-7-7-4 18-7z"/></svg><span class="l">+ Query</span></button>
      <button><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 3.6-6.5 8-6.5s8 2.5 8 6.5"/></svg><span class="l">+ Agent</span></button>
    </div>
    <div class="util">
      <button class="item"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h.01a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.01a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>Settings</button>
      <button class="item"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M9.5 9a2.5 2.5 0 0 1 4.9.8c0 1.7-2.4 2.2-2.4 3.7"/><path d="M12 17h.01"/></svg>Help centre</button>
    </div>
    <div class="foot"><span class="avatar">B</span><div><div class="un">Bethus Wethus</div><div class="up">Free</div></div></div>
  </div>
</template>

<script>
[['t-capp','Cappuccino'],['t-bold','Bold Pastille'],['t-edn','Editorial']].forEach(function(t){
  var sw = document.createElement('div');
  sw.className = 'swatch ' + t[0];
  sw.innerHTML = '<div class="vlab">' + t[1] + '</div>';
  sw.appendChild(document.getElementById('railT').content.cloneNode(true));
  document.getElementById('rails').appendChild(sw);
});
</script>
</body>
</html>
