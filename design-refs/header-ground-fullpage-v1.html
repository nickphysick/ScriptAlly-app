<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScriptAlly — Header ground, full Agents page × three themes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#e7e1d7;color:#3a1c14;padding:34px 30px 70px}
h1{font-family:'Playfair Display',serif;font-size:26px;font-weight:500;color:#5d4037}
.sub{font-size:12.5px;font-weight:300;color:#8a7a6c;margin-top:6px;max-width:780px;line-height:1.6}
.grouplab{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:#7c3a2a;margin:38px 0 6px}
.groupsub{font-size:11px;font-weight:300;color:#8a7a6c;margin-bottom:16px;max-width:700px;line-height:1.5}
.vlab{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.16em;text-transform:uppercase;margin:16px 0 8px;color:#5d4037}

/* ===== frame + shared structure, all themed by vars ===== */
.frame{display:flex;background:var(--desk);border:1px solid rgba(0,0,0,0.08);border-radius:14px;overflow:hidden;max-width:1080px}
.railmini{width:54px;flex:none;background:var(--card);border-right:1px solid var(--hair);display:flex;flex-direction:column;align-items:center;gap:13px;padding:12px 0}
.railmini .lg{width:22px;height:22px}
.railmini .lg path{stroke:var(--ink)}
.railmini i{width:15px;height:15px;border-radius:5px;background:var(--railidle)}
.railmini i.on{background:var(--pillon)}
.main{flex:1;min-width:0}
.chrome{background:var(--chrome);border-bottom:var(--chromebd)}
.strip{display:flex;align-items:center;min-height:34px;padding:6px 18px}
.crumb{font-family:'JetBrains Mono',monospace;font-size:8.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--label)}
.crumb .sep{margin:0 7px;color:var(--sep)}
.crumb b{color:var(--accent);font-weight:700}
.hd{display:flex;align-items:flex-end;gap:14px;padding:6px 18px 12px}
.ttl{font-family:'Playfair Display',serif;font-size:25px;font-weight:500;color:var(--headc);line-height:1.05}
.meta{font-family:'JetBrains Mono',monospace;font-size:7.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:4px}
.hd .right{margin-left:auto;display:flex;align-items:center;gap:9px}
.search{display:inline-flex;align-items:center;gap:7px;background:var(--btnbg);border:var(--btnbd);border-radius:99px;padding:6px 12px;font-size:11px;color:var(--label);min-width:195px;box-shadow:var(--btnsh)}
.btn{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:500;padding:7px 14px;border-radius:10px;background:var(--btnbg);border:var(--btnbd);color:var(--headc);box-shadow:var(--btnsh)}
.tabs{display:inline-flex;gap:4px;padding:0 18px 11px}
.tab{font-size:11px;font-weight:500;color:var(--itemtx);padding:4px 12px;border-radius:99px}
.tab.on{background:var(--pillon);color:var(--accent)}

.body{padding:14px 18px 18px;display:flex;gap:12px}
.list{width:250px;flex:none;background:var(--card);border:var(--cardbd);border-radius:12px;overflow:hidden;box-shadow:var(--cardsh)}
.fits{display:flex;align-items:center;gap:8px;background:var(--fits);border-bottom:1px solid var(--hair);padding:8px 13px;font-family:'JetBrains Mono',monospace;font-size:7px;letter-spacing:.16em;text-transform:uppercase;color:var(--fitstx)}
.lrow{display:flex;align-items:center;gap:9px;padding:9px 12px;border-bottom:1px solid var(--hairsoft)}
.lrow:last-child{border-bottom:none}
.lmono{width:26px;height:26px;border-radius:50%;background:var(--centre);color:var(--accent);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:11px;flex:none}
.lrow .n{font-family:'Playfair Display',serif;font-size:13px;color:var(--ink)}
.lrow .a{font-family:'JetBrains Mono',monospace;font-size:6px;letter-spacing:.1em;text-transform:uppercase;color:var(--label);margin-top:1px}
.stars{font-size:8px;color:var(--accent);letter-spacing:2px;margin-top:2px}
.stars .off{color:var(--staroff)}
.pane{flex:1;background:var(--card);border:var(--cardbd);border-radius:12px;overflow:hidden;box-shadow:var(--cardsh)}
.pn{padding:16px 18px 12px;display:flex;align-items:center;gap:12px}
.pmono{width:44px;height:44px;border-radius:50%;background:var(--ink);color:var(--card);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:16px}
.pn .nm{font-family:'Playfair Display',serif;font-size:20px;color:var(--ink)}
.pn .ag{font-family:'JetBrains Mono',monospace;font-size:7px;letter-spacing:.14em;text-transform:uppercase;color:var(--label);margin-top:2px}
.open{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:7px;letter-spacing:.1em;text-transform:uppercase;color:var(--headc);border:var(--btnbd);border-radius:99px;padding:5px 11px;display:inline-flex;align-items:center;gap:6px}
.open i{width:6px;height:6px;border-radius:50%;background:var(--accent)}
.wish{background:var(--wish);border-top:1px solid var(--hair);border-bottom:1px solid var(--hair);padding:13px 18px;font-family:'Playfair Display',serif;font-style:italic;font-size:13px;color:var(--ink);text-align:center}
.wish .g{font-family:'JetBrains Mono',monospace;font-style:normal;font-size:6.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--fitstx);display:block;margin-top:7px}
.prow{display:flex;gap:12px;padding:13px 18px 16px}
.pcell{flex:1}
.pcell .k{font-family:'JetBrains Mono',monospace;font-size:6.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--label)}
.pcell .v{font-family:'Playfair Display',serif;font-size:14px;color:var(--ink);margin-top:4px}
.pcell .s{font-size:9px;color:var(--muted);margin-top:2px}

/* ===== THEMES ===== */
.t-capp{--desk:#f2ede7;--card:#fffefb;--cardbd:1px solid #e7ddd2;--cardsh:0 1px 3px rgba(58,28,20,0.05);
  --hair:#e7ddd2;--hairsoft:#f2e9db;--ink:#3a1c14;--headc:#5d4037;--label:#9c8878;--muted:#8a7a6c;--sep:#c9bba9;
  --accent:#7c3a2a;--centre:#f6e4da;--pillon:#f6e4da;--railidle:#eadfce;--itemtx:#6a5a50;--staroff:#dccfc0;
  --btnbg:#ffffff;--btnbd:1px solid #ded3c2;--btnsh:none;--fits:#efe9df;--fitstx:#8a7a6c;--wish:#f6f1e8}
.t-bold{--desk:#c2cfda;--card:#fffefb;--cardbd:1.5px solid #1d1712;--cardsh:4px 4px 0 rgba(29,23,18,0.9);
  --hair:rgba(29,23,18,0.25);--hairsoft:rgba(29,23,18,0.12);--ink:#1d1712;--headc:#1d1712;--label:#6a6560;--muted:#5e5954;--sep:#9a948e;
  --accent:#1d1712;--centre:#f8dcd8;--pillon:#eec9c3;--railidle:#dfe6ec;--itemtx:#2b2622;--staroff:#cfc9c3;
  --btnbg:#ffffff;--btnbd:1.5px solid #1d1712;--btnsh:2px 2px 0 rgba(29,23,18,0.85);--fits:#f4c7c2;--fitstx:#1d1712;--wish:#f6e9e7}
.t-edn{--desk:#f4f4f3;--card:#ffffff;--cardbd:1px solid transparent;--cardsh:0 1px 2px rgba(20,20,20,0.05),0 12px 30px rgba(20,20,20,0.08);
  --hair:#ececeb;--hairsoft:#f1f1f0;--ink:#1a1a1a;--headc:#1a1a1a;--label:#8a8d90;--muted:#7d8083;--sep:#c4c6c8;
  --accent:#44484d;--centre:#e9eaeb;--pillon:#e9eaeb;--railidle:#ececeb;--itemtx:#3c3f43;--staroff:#d8d9da;
  --btnbg:#ffffff;--btnbd:1px solid #dcdcdb;--btnsh:0 1px 2px rgba(20,20,20,0.04);--fits:#ececeb;--fitstx:#5e6165;--wish:#f4f4f3}

/* ===== OPTION A · card slab ===== */
.opt-a.t-capp{--chrome:#fffefb;--chromebd:1px solid #e7ddd2}
.opt-a.t-bold{--chrome:#fffefb;--chromebd:1.5px solid #1d1712}
.opt-a.t-edn{--chrome:#ffffff;--chromebd:1px solid #ececeb}
.opt-a.t-edn .chrome{box-shadow:0 3px 10px rgba(20,20,20,0.04)}

/* ===== OPTION B · deeper tone ===== */
.opt-b.t-capp{--chrome:#eae1d3;--chromebd:1px solid #ddd1bf}
.opt-b.t-capp .search,.opt-b.t-capp .btn{background:#fffdf9}
.opt-b.t-bold{--chrome:#b3c3d1;--chromebd:1.5px solid #1d1712}
.opt-b.t-edn{--chrome:#ebebe9;--chromebd:1px solid #e0e0de}
</style>
</head>
<body>

<h1>Full Agents page — two grounds × three themes</h1>
<p class="sub">Option A (chrome on the card white) and Option B (chrome deepened into the desk family), each rendered
as the full page in Cappuccino, Bold Pastille and Editorial. Foam-band (C) and flat (D) are dropped as discussed.</p>

<div id="out"></div>

<template id="pageT">
  <div class="frame">
    <div class="railmini">
      <svg class="lg" viewBox="0 0 24 24"><path d="M21 3L10 14" stroke-width="1.5" fill="none"/><path d="M21 3l-7 18-4-7-7-4 18-7z" stroke-width="1.5" fill="none"/></svg>
      <i></i><i></i><i class="on"></i><i></i><i></i>
    </div>
    <div class="main">
      <div class="chrome">
        <div class="strip"><span class="crumb">ScriptAlly<span class="sep">/</span>Agents<span class="sep">/</span><b>Database</b></span></div>
        <div class="hd">
          <div><div class="ttl">Agents</div><div class="meta">16 agents on file</div></div>
          <div class="right"><span class="search">⌕ Find agent or agency…</span><span class="btn">+ Add agent</span></div>
        </div>
        <div class="tabs"><span class="tab on">Database</span><span class="tab">Discover</span></div>
      </div>
      <div class="body">
        <div class="list">
          <div class="fits">Top picks ★★★★★</div>
          <div class="lrow"><span class="lmono">CB</span><div><div class="n">Charlotte Bronte</div><div class="a">Highland &amp; Moor Literary</div><div class="stars">★★★★★</div></div></div>
          <div class="lrow"><span class="lmono">EV</span><div><div class="n">Eleanor Vance</div><div class="a">Vance and Co Literary</div><div class="stars">★★★★★</div></div></div>
          <div class="fits">Strong fits ★★★★</div>
          <div class="lrow"><span class="lmono">AD</span><div><div class="n">Arthur Conan Doyle</div><div class="a">Baker Street Associates</div><div class="stars">★★★★<span class="off">★</span></div></div></div>
          <div class="lrow"><span class="lmono">BS</span><div><div class="n">Bram Stoker</div><div class="a">Transylvania Literary Hub</div><div class="stars">★★★★<span class="off">★</span></div></div></div>
        </div>
        <div class="pane">
          <div class="pn"><span class="pmono">CB</span>
            <div><div class="nm">Charlotte Bronte</div><div class="ag">Highland &amp; Moor Literary · charlotte@highlandmoor.com</div></div>
            <span class="open"><i></i>Open to queries</span></div>
          <div class="wish">"Looking for fierce, independent heroines, slow-burn emotional stakes, and atmospheric Victorian settings."
            <span class="g">Historical fantasy · Gothic romance · Young adult</span></div>
          <div class="prow">
            <div class="pcell"><div class="k">Response time</div><div class="v">within 6 weeks</div><div class="s">based on recent replies</div></div>
            <div class="pcell"><div class="k">Preferred method</div><div class="v">Email</div><div class="s">direct to inbox</div></div>
            <div class="pcell"><div class="k">Wanted materials</div><div class="v">Query, synopsis, pages</div><div class="s">per submission guidelines</div></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</template>

<script>
var groups = [
  {opt:'opt-a', name:'Option A · The card slab', sub:'Chrome zone on the card white; content on the theme desk. In Editorial the white-on-white is separated by hairline + a soft slab shadow.'},
  {opt:'opt-b', name:'Option B · The deeper tone', sub:'Chrome zone deepened into each theme\\u2019s desk family; white stays reserved for cards. Bold deepens its blue-grey; Editorial deepens its grey.'}
];
var themes = [['t-capp','Cappuccino'],['t-bold','Bold Pastille'],['t-edn','Editorial']];
var out = document.getElementById('out');
groups.forEach(function(g){
  var gl = document.createElement('div'); gl.className='grouplab'; gl.textContent = g.name; out.appendChild(gl);
  var gs = document.createElement('div'); gs.className='groupsub'; gs.textContent = g.sub; out.appendChild(gs);
  themes.forEach(function(t){
    var vl = document.createElement('div'); vl.className='vlab'; vl.textContent = t[1]; out.appendChild(vl);
    var wrap = document.createElement('div'); wrap.className = g.opt + ' ' + t[0];
    wrap.appendChild(document.getElementById('pageT').content.cloneNode(true));
    out.appendChild(wrap);
  });
});
</script>
</body>
</html>
