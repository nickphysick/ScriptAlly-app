<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>To-do — workspace v6</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;450;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --oat:#f1e8dc; --oatline:#e0d3c1; --paper:#faf6f0; --panel:#fffdfb; --white:#fff;
  --line:#e6dccd; --hairline:#f0eae1;
  --ink:#1e1a16; --ink-2:#4a443c; --muted:#7d7469; --faint:#a89e91;
  --sh-1:0 1px 2px rgba(58,42,26,.05);
  --sh-2:0 1px 2px rgba(58,42,26,.05),0 4px 10px -2px rgba(58,42,26,.06);
  --sh-3:0 3px 6px rgba(58,42,26,.07),0 16px 40px -8px rgba(58,42,26,.18);
  --sh-btn:0 1px 2px rgba(58,42,26,.10);
  --pink-t:#f7e3dd; --pink-b:#eecdc3; --pink-i:#8a4030; --pink-av:#f6d7cf;
  --pink-btn:#f6cfc9; --pink-btn-h:#f0bfb8; --pink-hero:#f9e8e2;
  --gold-t:#f6efdd; --gold-b:#e7d9b8; --gold-i:#7d621d; --gold:#a8842c;
  --note-t:#faf0c8; --note-b:#ecdda4; --note-i:#7a6420;
  --sageC:#e9ede6; --sage-edge:#c8d0c5; --sageD:#5a6e58; --sage:#8a9e88;
  --burg:#7c3a2a; --pinkC:#f8e7dc;
  --r-sm:6px; --r-md:9px; --r-lg:12px; --r-xl:16px;
  --mono:'JetBrains Mono',monospace; --serif:'Playfair Display',serif; --body:'Inter',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--body);background:var(--oat);color:var(--ink);font-size:13px;line-height:1.45;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;height:100vh;overflow:hidden}
button{font:inherit;cursor:pointer;background:none;border:none;color:inherit;text-align:left}
svg{display:block}
input,textarea{font:inherit;color:inherit}

.hd{flex:none;height:56px;background:var(--panel);border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 16px 0 10px;gap:10px}
.hd .up{font-family:var(--mono);font-size:9px;letter-spacing:.11em;color:#9d8f80}
.hd .here{font-family:var(--serif);font-size:19px;font-weight:600}
.hd .right{margin-left:auto}
.av2{width:30px;height:30px;border-radius:50%;background:var(--pink-av);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;font-weight:600}
.act{display:inline-flex;padding:8px;border-radius:var(--r-md);color:var(--ink-2)}
.act:hover{background:var(--paper)}
.act svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round}

.stage{flex:1;overflow-y:auto;min-height:0}
.wrap{width:100%;max-width:1520px;margin:0 auto;padding:16px 12px 26px}

/* ===== TOP ROW ===== */
/* fixed shelf: the top row never resizes — Today's list scrolls inside it.
   344 = header 44 + body ~236 (4 rows) + footer ~64 */
.toprow{display:grid;grid-template-columns:1fr 400px;gap:12px;height:344px}
.toprow>*{height:100%;min-height:0}
@media(max-width:1120px){.toprow{grid-template-columns:1fr;height:auto}.today{height:344px}}
.hero{position:relative;background:linear-gradient(135deg,var(--pink-hero),#f4dcd4);border:1px solid var(--pink-b);border-radius:var(--r-xl);padding:24px 28px;box-shadow:var(--sh-1);overflow:hidden;display:flex;flex-direction:column;justify-content:center;min-height:0}
.hero::after{content:"";position:absolute;right:-40px;bottom:-50px;width:210px;height:210px;border-radius:50%;background:rgba(255,255,255,.32)}
.hero>*{position:relative;z-index:2}
.kick{font-family:var(--mono);font-size:8.5px;letter-spacing:.15em;text-transform:uppercase;color:var(--pink-i);opacity:.85}
.hero h1{font-family:var(--serif);font-size:30px;font-weight:600;line-height:1.18;margin-top:8px;color:#3a2019;max-width:510px}
.hero h1 em{font-style:italic}
.hero .sub{font-size:13px;color:#6d4a41;margin-top:8px;max-width:480px;line-height:1.55}
.hstrip{display:flex;margin-top:14px;font-family:var(--mono);font-size:8.5px;letter-spacing:.09em;text-transform:uppercase;color:var(--pink-i)}
.hstrip span{padding-right:14px;margin-right:14px;border-right:1px solid var(--pink-b);opacity:.9}
.hstrip span:last-child{border:none;margin:0;padding:0}
.hstrip b{font-family:var(--serif);font-size:14px;font-weight:600;color:#3a2019;letter-spacing:0}
.hact{display:flex;gap:8px;margin-top:16px}
.btn-pri{display:inline-block;font-size:13px;font-weight:600;padding:10px 18px;border-radius:var(--r-md);background:var(--ink);color:var(--panel);box-shadow:var(--sh-btn);white-space:nowrap;line-height:1.2}
.btn-pri:hover{background:#332c25}
.btn-sec{display:inline-block;font-size:13px;font-weight:500;padding:10px 17px;border-radius:var(--r-md);background:var(--panel);border:1px solid var(--pink-b);box-shadow:var(--sh-btn);color:var(--pink-i);white-space:nowrap;line-height:1.2}
.btn-sec:hover{background:#fff}

/* TODAY BOX — capped at ~4 rows, fade-scroll after */
.today{background:var(--panel);border:1px solid var(--pink-b);border-radius:var(--r-xl);box-shadow:var(--sh-2);display:flex;flex-direction:column;overflow:hidden}
.today.over{border-color:var(--ink);box-shadow:var(--sh-3)}
.today.pulse{animation:pulse .46s ease}
@keyframes pulse{0%,100%{box-shadow:var(--sh-2)}50%{box-shadow:0 0 0 4px var(--pink-t),var(--sh-3)}}
.th{display:flex;align-items:center;gap:9px;padding:13px 15px;background:var(--pink-t);border-bottom:1px solid var(--pink-b);flex:none}
.th .t{font-family:var(--serif);font-size:16px;font-weight:600;color:#3a2019}
.th .c{margin-left:auto;font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.08em;color:var(--pink-i);background:var(--panel);border:1px solid var(--pink-b);border-radius:99px;padding:2px 8px}
/* fills the fixed shelf; ~4 rows visible, the rest scrolls under a fade */
.tb{flex:1;min-height:0;padding:9px;display:flex;flex-direction:column;gap:6px;overflow-y:auto;scrollbar-width:thin}
.tb.fade{-webkit-mask-image:linear-gradient(180deg,#000 0,#000 calc(100% - 26px),transparent 100%);mask-image:linear-gradient(180deg,#000 0,#000 calc(100% - 26px),transparent 100%)}
.trow{display:flex;align-items:center;gap:9px;padding:8px 9px;border-radius:var(--r-sm);border:1px solid var(--hairline);background:var(--panel);cursor:pointer;flex:none;animation:slidein .32s cubic-bezier(.2,.9,.3,1)}
@keyframes slidein{from{opacity:0;transform:translateX(20px) scale(.95)}to{opacity:1;transform:none}}
.trow:hover{border-color:var(--pink-b);background:#fffcfa}
.trow .tx{font-size:12.5px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.trow .tm{font-family:var(--mono);font-size:8px;letter-spacing:.07em;text-transform:uppercase;color:var(--faint);margin-top:2px}
.trow .x{color:var(--faint);font-size:12px;padding:0 3px}
.trow .x:hover{color:var(--pink-i)}
.rollbar{display:flex;align-items:center;gap:8px;padding:9px 13px;background:var(--gold-t);border-bottom:1px solid var(--gold-b);font-size:12px;color:var(--gold-i);flex:none}
.rollbar b{font-weight:600}
.rollbar button{font-family:var(--mono);font-size:8px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:4px 9px;border-radius:99px;border:1px solid var(--gold-b);background:var(--panel);color:var(--gold-i)}
.rollbar button:hover{background:#f0e6c9}
.rollbar button.drop{border-color:var(--line);color:var(--muted)}
.tempty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:9px;padding:14px;color:var(--muted)}
.tempty .e1{font-family:var(--serif);font-style:italic;font-size:15px}
.tempty .e2{font-family:var(--mono);font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint)}
.tf{padding:11px 13px;border-top:1px solid var(--hairline);background:var(--paper);display:flex;flex-direction:column;gap:9px;flex:none}
.tbar{height:4px;border-radius:99px;background:var(--panel);border:1px solid var(--hairline);overflow:hidden}
.tbar i{display:block;height:100%;background:var(--sageD);transition:width .4s}
.tfr{display:flex;align-items:center;gap:8px}
.tfr .pc{font-family:var(--mono);font-size:8.5px;letter-spacing:.08em;color:var(--faint);flex:1}
.walk{font-size:12.5px;font-weight:600;padding:8px 14px;border-radius:var(--r-md);background:var(--pink-btn);box-shadow:var(--sh-btn);white-space:nowrap}
.walk:hover{background:var(--pink-btn-h)}
.pick{font-size:12.5px;font-weight:600;padding:8px 14px;border-radius:var(--r-md);background:var(--ink);color:var(--panel);white-space:nowrap}
.pick:hover{background:#332c25}

.tools{display:flex;align-items:center;gap:8px;margin:16px 0 11px}
.tool{font-size:12.5px;padding:8px 13px;border-radius:var(--r-md);background:var(--panel);border:1px solid var(--line);box-shadow:var(--sh-btn);color:var(--ink-2)}
.tool:hover{border-color:var(--ink-2)}
.tools .sp{flex:1}
.add-pri{font-size:13px;font-weight:600;padding:9px 16px;border-radius:var(--r-md);background:var(--pink-btn);box-shadow:var(--sh-btn)}
.add-pri:hover{background:var(--pink-btn-h)}

/* board */
.board{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.col{background:var(--paper);border:1px solid var(--line);border-radius:var(--r-lg);display:flex;flex-direction:column;min-height:300px;overflow:hidden}
.colh{display:flex;align-items:center;gap:9px;padding:12px 13px;border-bottom:1px solid;flex-wrap:wrap}
.colh .ct{font-weight:600;font-size:13px}
.colh .cn{font-family:var(--mono);font-size:9px;font-weight:700;border-radius:99px;padding:2px 8px;margin-left:auto;background:rgba(255,255,255,.75)}
.colh .cadd{font-size:15px;padding:0 3px;opacity:.65}
.colh .cadd:hover{opacity:1}
.colh .mutelink{width:100%;font-family:var(--mono);font-size:8px;letter-spacing:.09em;text-transform:uppercase;opacity:.75;text-decoration:underline;text-underline-offset:2px}
.colh .mutelink:hover{opacity:1}
.col.do .colh{background:var(--pink-t);border-color:var(--pink-b);color:var(--pink-i)}
.col.hk .colh{background:var(--gold-t);border-color:var(--gold-b);color:var(--gold-i)}
.col.nt .colh{background:var(--note-t);border-color:var(--note-b);color:var(--note-i)}
.col.done .colh{background:var(--sageC);border-color:var(--sage-edge);color:var(--sageD)}
.colb{flex:1;padding:9px;display:flex;flex-direction:column;gap:9px;overflow-y:auto}

.tile{background:var(--panel);border:1px solid var(--line);border-radius:var(--r-md);padding:12px;box-shadow:var(--sh-1);cursor:pointer;transition:box-shadow .2s,border-color .2s}
.tile:hover{border-color:var(--ink-2);box-shadow:var(--sh-2)}
.tile.drag{opacity:.4}
.tile.today{border-color:var(--pink-b);box-shadow:inset 3px 0 0 var(--pink-btn),var(--sh-1)}
.tile.pickpulse{animation:pickpulse .44s cubic-bezier(.3,.8,.4,1) both}
@keyframes pickpulse{
  0%{box-shadow:var(--sh-1)}
  38%{box-shadow:0 0 0 4px var(--pink-t),var(--sh-2);border-color:var(--pink-i);transform:scale(1.03)}
  100%{opacity:.18;transform:scale(.96)}
}
.tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.tag{font-family:var(--mono);font-size:8px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;border-radius:99px;padding:2.5px 8px;border:1px solid}
.tag.due{background:var(--panel);border-color:var(--line);color:var(--muted)}
.tag.due.warn{background:var(--pink-t);border-color:var(--pink-b);color:var(--pink-i)}
.tag.tdy{background:var(--pink-btn);border-color:var(--pink-b);color:#5a2b20}
.tag.snz{background:var(--paper);border-color:var(--line);color:var(--faint)}
.tt{font-weight:600;font-size:13.5px;line-height:1.35}
.tt em{font-family:var(--serif);font-style:italic;color:var(--burg);font-weight:600}
.tsub{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.45}
/* meta line */
.tmeta{display:flex;align-items:center;gap:8px;margin-top:11px;padding-top:10px;border-top:1px solid var(--hairline)}
.miniav{width:20px;height:20px;border-radius:50%;background:var(--pink-av);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:8px;font-weight:600;color:#5a2b20;flex:none}
.miniav.hk{background:var(--gold-t);border:1px solid var(--gold-b);color:var(--gold-i)}
.miniav.nt{background:var(--note-t);border:1px solid var(--note-b);color:var(--note-i)}
.who{font-family:var(--mono);font-size:8.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--faint);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* the two pills */
.tacts{display:flex;gap:6px;margin-top:9px}
.pill{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:6px;font-family:var(--mono);font-size:8.5px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;border-radius:99px;padding:7px 6px;border:1px solid;white-space:nowrap;transition:.13s}
.pill.today-p{background:var(--pink-t);border-color:var(--pink-b);color:var(--pink-i)}
.pill.today-p:hover{background:var(--pink-btn)}
.pill.today-p.on{background:var(--pink-btn);border-color:var(--pink-i)}
.pill.done-p{background:var(--panel);border-color:var(--line);color:var(--ink-2)}
.pill.done-p:hover{background:var(--sageC);border-color:var(--sage-edge);color:var(--sageD)}
.pill .tk{width:12px;height:12px;border:1.4px solid currentColor;border-radius:3px;display:inline-flex;align-items:center;justify-content:center;font-size:8px;flex:none;opacity:.75}
.dot{position:relative;width:14px;height:14px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:7.5px;flex:none}
.dot.q{border:1.5px solid var(--burg);background:var(--pinkC);color:var(--burg)}
.dot.q::after{content:"→";font-weight:700}
.dot.freq{border:2.5px solid var(--sage);background:var(--sageC);color:var(--sageD)}
.dot.freq::after{content:"←";font-weight:700}
.dot.nudge{border:1.5px dashed var(--burg);background:transparent;color:var(--burg)}
.dot.nudge::after{content:"↻";font-weight:700}
.dot.hk{border:1.5px solid var(--gold);background:var(--gold-t);color:var(--gold)}
.dot.hk::after{content:"!";font-weight:700}
.ghostadd{border:1.5px dashed var(--note-b);border-radius:var(--r-md);padding:10px;text-align:center;font-size:12.5px;color:var(--note-i)}
.ghostadd:hover{background:var(--note-t)}
.colempty{text-align:center;padding:22px 8px;font-family:var(--serif);font-style:italic;font-size:13px;color:var(--faint)}
/* grouped housekeeping */
.gtile{background:var(--panel);border:1px solid var(--gold-b);border-radius:var(--r-md);padding:12px;box-shadow:var(--sh-1);cursor:pointer;transition:.16s}
.gtile:hover{border-color:var(--gold-i);box-shadow:var(--sh-2)}
.gtile .gcount{display:flex;align-items:baseline;gap:7px}
.gtile .gn{font-family:var(--serif);font-size:26px;font-weight:600;color:var(--gold-i);line-height:1}
.gtile .gw{font-weight:600;font-size:13.5px;line-height:1.35;padding-top:2px}
.gtile .gs{font-size:12px;color:var(--muted);margin-top:5px;line-height:1.45}
.stack{display:flex;margin-top:11px;padding-top:10px;border-top:1px solid var(--hairline);align-items:center}
.stack .sav{width:22px;height:22px;border-radius:50%;background:var(--gold-t);border:1.5px solid var(--panel);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:7.5px;font-weight:600;color:var(--gold-i);margin-right:-7px;flex:none}
.stack .more{margin-left:14px;font-family:var(--mono);font-size:8.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--faint)}
.gtile .gact{display:flex;gap:6px;margin-top:9px}
.gtile .gpri{flex:1;text-align:center;font-family:var(--mono);font-size:8.5px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;border-radius:99px;padding:7px 6px;border:1px solid var(--gold-b);background:var(--gold-t);color:var(--gold-i)}
.gtile .gpri:hover{background:#f0e6c9}
.gtile .gmute{font-family:var(--mono);font-size:8.5px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;border-radius:99px;padding:7px 11px;border:1px solid var(--line);background:var(--panel);color:var(--muted)}
.gtile .gmute:hover{color:var(--gold-i);border-color:var(--gold-b)}
.idletile{border:1px dashed var(--oatline);border-radius:var(--r-md);padding:12px;background:transparent;cursor:pointer}
.idletile:hover{background:var(--panel)}
.idletile .it{font-size:12.5px;color:var(--muted);line-height:1.5}
.idletile .it b{color:var(--ink-2);font-weight:600}
.idletile .ic{font-family:var(--mono);font-size:8px;letter-spacing:.09em;text-transform:uppercase;color:var(--faint);margin-top:7px}

/* batch fix rows */
.bhead{display:flex;align-items:center;gap:9px;padding:10px 12px;background:var(--gold-t);border:1px solid var(--gold-b);border-radius:var(--r-md);margin-bottom:11px;font-size:12.5px;color:var(--gold-i)}
.bhead b{font-weight:600}
.brow{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--hairline)}
.brow:last-child{border-bottom:none}
.brow.filled{opacity:.55}
.brow .bav{width:26px;height:26px;border-radius:50%;background:var(--gold-t);border:1px solid var(--gold-b);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:8px;font-weight:600;color:var(--gold-i);flex:none}
.brow .bn{width:118px;flex:none;min-width:0}
.brow .bnn{font-size:12.5px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.brow .bna{font-family:var(--mono);font-size:7.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--faint);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.brow .bf{flex:1;min-width:0}
.brow input{width:100%;border:1px solid var(--line);border-radius:var(--r-sm);padding:7px 9px;font-size:12.5px;background:var(--white)}
.brow input:focus{outline:none;border-color:var(--ink);box-shadow:inset 0 0 0 1px var(--ink)}
.brow .bchips{display:flex;gap:4px;flex-wrap:wrap}
.brow .bc{font-size:11px;padding:5px 9px;border-radius:99px;border:1px solid var(--line);background:var(--panel);color:var(--ink-2)}
.brow .bc:hover{border-color:var(--ink-2)}
.brow .bc.on{background:var(--sageC);border-color:var(--sage-edge);color:var(--sageD);font-weight:600}
.brow .bx{color:var(--faint);font-size:12px;padding:0 4px;flex:none}
.brow .bx:hover{color:var(--pink-i)}
.findall{display:flex;align-items:center;gap:9px;width:100%;margin-top:14px;padding:12px 13px;border:1px solid var(--sage-edge);border-radius:var(--r-md);background:var(--sageC);font-size:13px;font-weight:600;color:var(--sageD);flex-wrap:wrap}
.findall:hover{background:#e2e8de;border-color:var(--sageD)}
.findall.busy{opacity:.75;pointer-events:none}
.findall .pro{font-family:var(--mono);font-size:7.5px;font-weight:700;letter-spacing:.11em;background:#6A89A7;color:#fff;border-radius:99px;padding:3px 7px;flex:none}
.findall .fa{width:100%;font-family:var(--mono);font-size:8px;letter-spacing:.07em;text-transform:uppercase;color:var(--faint);font-weight:400}
.fnd{font-family:var(--mono);font-size:7.5px;letter-spacing:.09em;text-transform:uppercase;color:var(--sageD);margin-top:4px}
.qd{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--burg);margin-left:5px;vertical-align:middle}
.bprog{font-family:var(--mono);font-size:8.5px;letter-spacing:.09em;text-transform:uppercase;color:var(--faint);flex:1}
.mutedrow{display:flex;align-items:center;gap:9px;padding:9px 10px;border:1px dashed var(--oatline);border-radius:var(--r-sm);font-size:12px;color:var(--muted);background:transparent}
.mutedrow .un{margin-left:auto;font-family:var(--mono);font-size:8px;letter-spacing:.07em;text-transform:uppercase;color:var(--gold-i);text-decoration:underline}

/* ===== DRAWER (guided, on-page) ===== */
.dscrim{position:fixed;inset:0;background:rgba(30,26,22,.26);z-index:150;opacity:0;pointer-events:none;transition:opacity .22s}
.dscrim.open{opacity:1;pointer-events:auto}

/* Housekeeping is grouped by RULE, and covers every agent — queried or not.

   whether to query them at all. Scale is handled by grouping + batch fixing,
   never by hiding people. Queried agents simply sort first within a group. */
function hkGroups(){
  const L=live().filter(i=>i.s==='hk');
  const byRule={};
  L.forEach(i=>{ (byRule[i.rule] ||= []).push(i); });
  const groups=[];
  Object.entries(byRule).forEach(([rule,list])=>{
    list.sort((a,b)=>(b.inPlay?1:0)-(a.inPlay?1:0));   // queried first
    if(rule==='stale'){ list.forEach(i=>groups.push({single:i})); }  // real one-off decisions
    else if(list.length===1) groups.push({single:list[0]});
    else groups.push({rule,list});
  });
  groups.sort((a,b)=>{
    const an=a.single?1:a.list.length, bn=b.single?1:b.list.length;
    const aw=a.single&&a.single.warn?1:0, bw=b.single&&b.single.warn?1:0;
    return bw-aw || bn-an;
  });
  return {groups};
}

/* ---- simulate a Smart Import of 24 agents: 3 gaps each = 72 raw housekeeping items ---- */
NAMES.forEach((n,ix)=>{
  const ag=AGENCIES[ix%AGENCIES.length];
  const inPlay = ix<5;               // only the first five have actually been queried
  ['mswl','window','mats'].forEach(r=>{
    if((ix+r.length)%3!==0) items.push(mkHk(r,n,ag,inPlay));

const COLS=[['do','Do next'],['hk','Housekeeping'],['nt','Your tasks'],['done','Cleared today']];
const SNAME={do:'Do next',hk:'Housekeeping',nt:'Your task'};
let cleared=[], muted=[], mutedRules=[], showMuted=false, rollDismissed=false;
/* Today's list is a commitment for ONE day. Uncompleted items don't silently
   vanish (you'd lose your list) and don't roll forever (then "today" means
   nothing) — they surface once, and you choose. */
function keepRolled(){ items.forEach(i=>i.rolled=false); rollDismissed=true; render(); toast('Kept on today’s list'); }
function dropRolled(){ items.forEach(i=>{ if(i.rolled){ i.today=false; i.rolled=false; } }); rollDismissed=true; render(); toast('Cleared — they’re still on the board'); }
let queue=[], step=0, staged={}, mode='urgent', wcap=false, wform={};
let openId=null, dstep=0, form={};

const live=()=>items.filter(i=>!(i.rule&&mutedRules.includes(i.rule)));
const todayItems=()=>live().filter(i=>i.today);
const strip=h=>h.replace(/<[^>]+>/g,'');
const wait=ms=>new Promise(r=>setTimeout(r,ms));

/* ---------- HELP ME PICK (pulse & fade) ---------- */
function choose(){
  const L=live();
  const dn=L.filter(i=>i.s==='do'&&!i.today).sort((a,b)=>(b.warn?1:0)-(a.warn?1:0)||a.rank-b.rank);
  const hk=L.filter(i=>i.s==='hk'&&!i.today).sort((a,b)=>(b.warn?1:0)-(a.warn?1:0)||a.rank-b.rank);
  const room=MAX_TODAY-todayItems().length;
  if(room<=0) return [];
  if(!dn.length) return hk.slice(0,Math.min(MAX_HK_IF_EMPTY,room));
  const picks=dn.slice(0,Math.min(MAX_DO,room));
  return picks.concat(hk.slice(0,Math.min(2,room-picks.length)));
}
async function helpMePick(){
  const picks=choose();
  if(!picks.length){ toast(`Today’s list is already full (${MAX_TODAY} max)`); return; }
  for(const it of picks){
    const el=document.querySelector(`.tile[data-id="${it.id}"]`);
    if(el){ el.classList.add('pickpulse'); await wait(440); }
    it.today=true; render();
    const b=document.getElementById('todaybox');
    if(b){ b.classList.add('pulse'); setTimeout(()=>b.classList.remove('pulse'),460); }
    await wait(180);
  }
  const d=picks.filter(p=>p.s==='do').length, h=picks.filter(p=>p.s==='hk').length;
  toast(`Picked ${picks.length} for today — ${d?d+' waiting on you':''}${d&&h?', ':''}${h?h+' housekeeping':''}`);
}

/* ---------- RENDER ---------- */
function hero(){
  const L=live();
  const dn=L.filter(i=>i.s==='do').length, hk=L.filter(i=>i.s==='hk').length;
  const press=L.filter(i=>i.warn).length;
  return `<div class="hero">
    <div class="kick">Your desk · Wednesday ${TODAY_STR}</div>
    <h1>${L.length} things need you${press?`, and <em>${press} ${press===1?'is pressing':'are pressing'}</em>`:''}.</h1>
    <div class="sub">Work the urgent ones straight through, or build a list you'll actually finish today.</div>
    <div class="hstrip"><span><b>${dn}</b> your move</span><span><b>${hk}</b> housekeeping</span><span><b>${cleared.length}</b> cleared today</span></div>
    <div class="hact">
      <button class="btn-pri" ${dn?'':'disabled style="opacity:.4"'} onclick="openWalk('urgent')">Urgent</button>
      <button class="btn-sec" onclick="toast('→ Queries Hub')">See all queries</button>
    </div>
  </div>`;
}
function todayBox(){
  const t=todayItems();
  const doneN=cleared.filter(c=>c.wasToday).length, total=t.length+doneN;
  const pct=total?Math.round(doneN/total*100):0;
  const body=t.length
    ? `<div class="tb" id="tbody">${t.map(i=>`<div class="trow" onclick="openTask(${i.id})" draggable="true" ondragstart="dragStart(event,${i.id})" ondragend="dragEnd(event)">
        ${i.task?`<span class="box" style="width:15px;height:15px;border:1.5px solid #d9cfc0;border-radius:4px;flex:none" onclick="event.stopPropagation();finish(${i.id})"></span>`:`<span class="dot ${i.dot}"></span>`}
        <div style="flex:1;min-width:0"><div class="tx">${strip(i.t)}</div><div class="tm">${i.rec}</div></div>
        <button class="x" onclick="event.stopPropagation();uncommit(${i.id})" title="Take off today">✕</button></div>`).join('')}</div>`
    : `<div class="tb"><div class="tempty">
        <div class="e1">Nothing committed yet.</div>
        <div class="e2">Drag a card here, or press ＋ Today’s list on any card</div></div></div>`;
  /* footer is ALWAYS rendered — its presence must not change the shelf height */
  const foot=`<div class="tf">
      <div class="tbar" style="${total?'':'visibility:hidden'}"><i style="width:${pct}%"></i></div>
      <div class="tfr">
        <span class="pc">${total?`${doneN} OF ${total} DONE`:'NOTHING COMMITTED'}</span>
        <button class="pick" onclick="helpMePick()">${t.length?'Add more':'Help me pick'}</button>
        <button class="walk" ${t.length?'':'disabled style="opacity:.35;pointer-events:none"'} onclick="openWalk('today')">Work the list</button>
      </div></div>`;
  const rolled=t.filter(i=>i.rolled).length;
  const rollbar = rolled&&!rollDismissed ? `<div class="rollbar">
      <span style="flex:1"><b>${rolled}</b> ${rolled===1?'item':'items'} rolled over from yesterday.</span>
      <button onclick="keepRolled()">Keep</button>
      <button class="drop" onclick="dropRolled()">Clear</button>
    </div>` : '';
  return `<div class="today" id="todaybox" ondragover="tOver(event)" ondragleave="tLeave(event)" ondrop="tDrop(event)">
    <div class="th"><span class="t">Today's list</span><span class="c">${t.length} / ${MAX_TODAY}</span></div>
    ${rollbar}${body}${foot}</div>`;
}
function tile(i){
  return `<div class="tile ${i.today?'today':''}" data-id="${i.id}" onclick="openTask(${i.id})" draggable="true" ondragstart="dragStart(event,${i.id})" ondragend="dragEnd(event)">
    <div class="tags">
      <span class="tag due ${i.warn?'warn':''}">${i.due}</span>
      ${i.snoozes?`<span class="tag snz">Snoozed ×${i.snoozes}</span>`:''}

      <span class="miniav ${i.s}">${i.ini}</span>

}
function doneTile(i){

      <span class="who">${i.rec}</span></div></div>`;
}
function groupTile(gr){
  const R=RULES[gr.rule], n=gr.list.length;
  const q=gr.list.filter(i=>i.inPlay).length;
  const shown=gr.list.slice(0,5);
  return `<div class="gtile" onclick="openBatch('${gr.rule}')">
    <div class="gcount"><span class="gn">${n}</span><span class="gw">agents ${R.group}</span></div>

    <div class="stack">
      ${shown.map(i=>`<span class="sav" title="${i.who}">${i.ini}</span>`).join('')}
      <span class="more">${n>5?`+${n-5} more`:''}${q?`${n>5?' · ':''}${q} queried`:''}</span>
    </div>
    <div class="gact">
      <button class="gpri" onclick="event.stopPropagation();openBatch('${gr.rule}')">${R.fix} together</button>
      <button class="gmute" onclick="event.stopPropagation();muteRule('${gr.rule}')" title="Never ask about this again">Never</button>

}
function mutedRow(i){
  return `<div class="mutedrow"><span style="flex:1;min-width:0">${strip(i.t)}</span>
    <button class="un" onclick="unmute(${i.id})">Unmute</button></div>`;
}
function render(){
  const L=live();
  let h=`<div class="toprow">${hero()}${todayBox()}</div>
    <div class="tools"><button class="tool">Filter</button><button class="tool">Sort</button>
      <span class="sp"></span><button class="add-pri" onclick="addTask()">＋ Add a task</button></div>
    <div class="board">`;
  COLS.forEach(([k,label])=>{
    const g = k==='done'?cleared:L.filter(i=>i.s===k);
    const mutedHere = k==='hk' ? muted.length : 0;
    const ruleMuted = k==='hk' ? mutedRules.length : 0;
    let inner='', countLabel=g.length;

    if(k==='hk'){
      const {groups}=hkGroups();
      countLabel = groups.reduce((n,gr)=>n+(gr.single?1:gr.list.length),0);
      inner = (showMuted?muted.map(mutedRow).join('')+mutedRules.map(r=>`<div class="mutedrow">
          <span style="flex:1">Never asking about ${RULES[r].label}</span>
          <button class="un" onclick="unmuteRule('${r}')">Unmute</button></div>`).join(''):'')
        + groups.map(gr=>gr.single?tile(gr.single):groupTile(gr)).join('')
        + (!groups.length?`<div class="colempty">Nothing to tidy.</div>`:'');
    } else {
      inner = g.map(i=>k==='done'?doneTile(i):tile(i)).join('')
        || (k==='nt'?`<button class="ghostadd" onclick="addTask()">＋ Add a task</button>`:`<div class="colempty">Nothing here.</div>`);
    }

    h+=`<div class="col ${k}"><div class="colh"><span class="ct">${label}</span><span class="cn">${countLabel}</span>
      ${k==='nt'?'<button class="cadd" onclick="addTask()">＋</button>':''}
      ${k==='hk'&&(mutedHere||ruleMuted)?`<button class="mutelink" onclick="showMuted=!showMuted;render()">
        ${mutedHere+ruleMuted} muted — ${showMuted?'hide':'show'}</button>`:''}
      </div>
      <div class="colb">${inner}</div></div>`;
  });
  document.getElementById('wrap').innerHTML=h+'</div>';
  const tb=document.getElementById('tbody');
  if(tb) tb.classList.toggle('fade', tb.scrollHeight>tb.clientHeight+2);
}

/* ---------- commit / drag ---------- */
let dragId=null;
function dragStart(e,id){ dragId=id; e.currentTarget.classList.add('drag'); }
function dragEnd(e){ e.currentTarget.classList.remove('drag'); }
function tOver(e){ e.preventDefault(); document.getElementById('todaybox').classList.add('over'); }
function tLeave(){ document.getElementById('todaybox').classList.remove('over'); }
function tDrop(e){ e.preventDefault(); document.getElementById('todaybox').classList.remove('over'); if(dragId)commit(dragId); dragId=null; }
function commit(id){
  const i=items.find(x=>x.id===id); if(!i||i.today)return;
  if(todayItems().length>=MAX_TODAY){ toast(`Today's list is capped at ${MAX_TODAY}`); return; }
  i.today=true; render(); toast('Added to today’s list',()=>{i.today=false;render();});
}
function uncommit(id){ const i=items.find(x=>x.id===id); if(!i)return; i.today=false; render(); toast('Taken off today’s list'); }
function toggleToday(id){ const i=items.find(x=>x.id===id); i.today?uncommit(id):commit(id); if(openId)renderTask(); }
function finish(id){
  const i=items.find(x=>x.id===id); if(!i)return;
  i.wasToday=i.today; items=items.filter(x=>x.id!==id); cleared.push(i); render();
  toast('Done',()=>{cleared=cleared.filter(c=>c.id!==id);items.push(i);render();});
}
/* Mark done on a derived card opens the guided capture — you can't "just tick" a real-world action */
function markDone(id){
  const i=items.find(x=>x.id===id); if(!i)return;
  if(i.task){ finish(id); return; }
  openTask(id,1);
}
function addTask(){
  const id=Math.max(...items.map(i=>i.id),0)+1;
  items.push({id,s:'nt',ini:'✎',rec:'Unassigned',today:false,task:true,snoozes:0,t:'New task',sub:'',due:'NO DATE',act:'Mark done',why:'Your own note.'});
  render(); openTask(id);
}

/* ---------- MUTE ---------- */
function mute(id){
  const i=items.find(x=>x.id===id); if(!i)return;
  items=items.filter(x=>x.id!==id); muted.push(i); closeTask(); render();
  toast('Muted — we won’t ask again',()=>{ muted=muted.filter(m=>m.id!==id); items.push(i); render(); });
}
function muteRule(rule){
  if(!mutedRules.includes(rule)) mutedRules.push(rule);
  closeTask(); render();
  toast(`We’ll stop asking about ${RULES[rule].label}`,()=>{ mutedRules=mutedRules.filter(r=>r!==rule); render(); });
}
function unmute(id){ const i=muted.find(m=>m.id===id); if(!i)return; muted=muted.filter(m=>m.id!==id); items.push(i); render(); toast('Unmuted'); }
function unmuteRule(r){ mutedRules=mutedRules.filter(x=>x!==r); render(); toast('Unmuted'); }

/* ---------- DRAWER: guided, on-page ---------- */
function siblings(it){ return live().filter(x=>x.s===it.s); }
function openTask(id,startStep){
  const it=items.find(x=>x.id===id); if(!it)return;
  openId=id; dstep=startStep||0; form={date:'2026-07-08',method:'Email',mats:(it.mats||[]).map(m=>m[1]),note:'',mswl:'',window:'',genres:[]};
  document.getElementById('dscrim').classList.add('open');
  document.getElementById('drawer').classList.add('open');
  renderTask();
}
function closeTask(){ openId=null; dstep=0;
  document.getElementById('dscrim').classList.remove('open');
  document.getElementById('drawer').classList.remove('open'); }
function stepTask(d){
  const it=items.find(x=>x.id===openId); if(!it)return;
  const sib=siblings(it), i=sib.findIndex(x=>x.id===openId);
  const n=sib[i+d]; if(n) openTask(n.id);
}
function goStep(n){ dstep=n; renderTask(); }

        </div>`;
        foot=`<button class="dghost" onclick="goStep(0)">← Back</button><span class="sp"></span>
          <button class="dpri" ${form.window?'':'disabled'} onclick="saveHk(${it.id})">Save to his profile</button>`;
      } else {
        body=`${dTop(it)}<div class="dsec"><div class="sh">What do you want to do?<span class="gl"></span></div>
          <div class="choice">
            <button class="chc" onclick="saveHk(${it.id},'Closed as no response')">
              <div><div class="ct2">Close it — no response</div>
              <div class="cs">Marks the query closed. It counts as “no response”, not a rejection, so your response rate stays honest.</div></div></button>
            <button class="chc" onclick="snoozeOne(${it.id})">
              <div><div class="ct2">Still waiting — ask me later</div>
              <div class="cs">Leaves it open. We’ll bring it back in a month.</div></div></button>
            <button class="chc warn" onclick="goStep(9)">
              <div><div class="ct2">Stop asking about this</div>
              <div class="cs">Leaves the query exactly as it is, and never chases you about it again.</div></div></button>
          </div></div>`;
        foot=`<button class="dghost" onclick="goStep(0)">← Back</button><span class="sp"></span>`;
      }
    } else if(dstep===9){
      /* ---- the two scopes of "never" ---- */
      body=`${dTop(it)}
        <div class="dsec"><div class="sh">Stop asking — how widely?<span class="gl"></span></div>
        <div class="choice">
          <button class="chc" onclick="mute(${it.id})">
            <div><div class="ct2">Just this one</div>
            <div class="cs">We’ll stop chasing you about <b>${it.rec}</b>, but keep flagging others like it.</div></div></button>
          ${it.rule?`<button class="chc" onclick="muteRule('${it.rule}')">
            <div><div class="ct2">All of them</div>
            <div class="cs">Never ask about <b>${RULES[it.rule].label}</b> again — not for this agent or any other.</div></div></button>`:''}
        </div>
        <div class="dwhy" style="margin-top:15px;font-size:12px;color:var(--faint)">
          Muting only stops the reminder. Nothing is deleted — the gap still shows on the profile,
          and you can unmute from the Housekeeping column whenever you like.</div>
        </div>`;
      foot=`<button class="dghost" onclick="goStep(0)">← Back</button><span class="sp"></span>`;
    } else {
      body=`<div class="donebox">${QUILL}<div class="t">Saved.</div>
        <div class="s">${it.rec} is up to date. That’s one less gap in what we can tell you.</div></div>`;
      foot=`<span class="sp"></span><button class="dpri" onclick="closeTask()">Done</button>`;
    }
  }

  /* -------- YOUR TASK -------- */
  else {
    body=`${dTop(it)}
      <div class="dsec"><div class="sh">Your note<span class="gl"></span></div>
        <div class="fld"><input value="${strip(it.t)}" placeholder="What is it?" oninput="items.find(x=>x.id===${it.id}).t=this.value"></div>
        <textarea class="dnote" placeholder="Write it down before it slips…" oninput="items.find(x=>x.id===${it.id}).sub=this.value">${it.sub}</textarea>
      </div>
      <div class="dsec"><div class="sh">Attached to<span class="gl"></span></div>
        <button class="dlink" onclick="toast('→ record')">${it.rec}<span class="ar">→</span></button>
        <div class="dwhy" style="margin-top:9px;font-size:11.5px;color:var(--faint);line-height:1.6">
          The same task shows in the <b>View tasks</b> popover on that record — one store, two views.</div>
      </div>`;
    foot=`<button class="dghost ${it.today?'on':''}" onclick="toggleToday(${it.id})">${it.today?'✓ On today':'＋ Today’s list'}</button>
      <span class="sp"></span>
      <button class="dghost" onclick="finish(${it.id});closeTask()">✓ Mark done</button>
      <button class="dpri" onclick="closeTask();render();toast('Saved')">Save</button>`;
  }

  const showSteps = it.s!=='nt' && dstep<9;
  d.innerHTML=`
    <div class="dh">
      <span class="stream ${it.s}">${SNAME[it.s]}</span>
      <div class="nav">
        <button class="nb" onclick="stepTask(-1)" ${si<=0?'disabled':''}>‹</button>
        <button class="nb" onclick="stepTask(1)" ${si>=sib.length-1?'disabled':''}>›</button>
      </div>
      <button class="cls" onclick="closeTask()">✕</button>
    </div>
    ${showSteps?`<div class="dsteps">${steps.map((s,ix)=>`<div class="dstep ${ix===dstep?'on':''} ${ix<dstep?'dn':''}">
      <div class="sl">${ix+1}. ${s}</div><div class="sr"></div></div>`).join('')}</div>`:''}
    <div class="db">${body}</div>
    <div class="df">${foot}</div>`;
}
function dTop(it){
  return `<div class="dtop">
    <span class="bigav ${it.s}">${it.ini}</span>
    <div style="flex:1;min-width:0">
      <div class="dn2">${it.t}</div>
      <div class="dr">${it.rec}</div>
      <div class="ddue ${it.warn?'':'q'}">${CLOCK} ${it.due}</div>
    </div></div>`;
}
function saveDo(id){ dstep=2; renderTask(); const it=items.find(x=>x.id===id);
  setTimeout(()=>{ it.wasToday=it.today; items=items.filter(x=>x.id!==id); cleared.push(it); render(); },50); }
function saveHk(id,msg){ dstep=3; renderTask(); const it=items.find(x=>x.id===id);
  setTimeout(()=>{ it.wasToday=it.today; items=items.filter(x=>x.id!==id); cleared.push(it); render(); if(msg)toast(msg); },50); }
function snoozeOne(id){
  const it=items.find(x=>x.id===id); if(!it)return;
  it.snoozes=(it.snoozes||0)+1;
  items=items.filter(x=>x.id!==id); closeTask(); render();
  toast('Snoozed',()=>{ items.push(it); it.snoozes--; render(); });
}
document.addEventListener('keydown',e=>{ if(e.key!=='Escape')return; if(batchRule)closeBatch(); else if(openId)closeTask(); });

/* ---------- BATCH FIX ---------- */
let batchRule=null, batchVals={}, batchSkip={}, batchFound={};
function openBatch(rule){
  batchRule=rule; batchVals={}; batchSkip={}; batchFound={}; openId=null;
  document.getElementById('dscrim').classList.add('open');
  document.getElementById('drawer').classList.add('open');
  renderBatch();
}
function bset(id,v){ batchVals[id]=v; renderBatch(); }
function bskip(id){ batchSkip[id]=true; renderBatch(); }
function renderBatch(){
  const d=document.getElementById('drawer');
  const R=RULES[batchRule];
  const list=live().filter(i=>i.s==='hk'&&i.rule===batchRule&&!batchSkip[i.id]);
  const filled=list.filter(i=>batchVals[i.id]).length;
  const q=list.filter(i=>i.inPlay).length;

  const rows=list.map(i=>{
    const v=batchVals[i.id]||'';
    const foundRec=batchFound[i.id]; const found=foundRec?{...foundRec}:null;
    const field = R.chips
      ? `<div class="bchips">${R.chips.map(c=>`<button class="bc ${v===c?'on':''}" onclick="bset(${i.id},'${c}')">${c}</button>`).join('')}</div>`
      : `<input value="${v.replace(/"/g,'&quot;')}" placeholder="${R.ph||''}" oninput="batchVals[${i.id}]=this.value" onchange="renderBatch()">`;
    return `<div class="brow ${v?'filled':''}">
      <span class="bav">${i.ini}</span>
      <div class="bn"><div class="bnn">${i.who}${i.inPlay?'<span class="qd" title="You have queried this agent"></span>':''}</div>
        <div class="bna">${i.rec}</div></div>
      <div class="bf">${field}${found&&v===found.val?`<div class="fnd">Found ${found.src} · ${found.date} — check before saving</div>`:''}</div>
      <button class="bx" onclick="bskip(${i.id})" title="Skip this one">✕</button>
    </div>`;
  }).join('');

  d.innerHTML=`
    <div class="dh"><span class="stream hk">Housekeeping · batch</span>
      <button class="cls" style="margin-left:auto" onclick="closeBatch()">✕</button></div>
    <div class="db">
      <div class="dtop"><span class="bigav hk" style="font-family:var(--serif);font-size:20px">${list.length}</span>
        <div style="flex:1;min-width:0">
          <div class="dn2">${R.fix}</div>
          <div class="dr">${list.length} agents${q?` · ${q} you’ve queried`:''}</div>
        </div></div>
      <div class="dwhy" style="margin-top:14px;font-size:12.5px;color:var(--muted);line-height:1.6">${R.payoff}</div>
      ${R.findable?`<button class="findall" onclick="findAll()">
        <span class="pro">PRO</span>
        <span style="flex:1">Find these for me</span>
        <span class="fa">Searches agency pages and #MSWL · nothing saves until you say so</span>
      </button>`:''}
      <div class="bhead">Fill what you know, skip what you don’t. <b>Nothing is required.</b></div>
      <div class="dsec"><div class="sh">${R.field}<span class="gl"></span></div>${rows||'<div class="colempty">All done.</div>'}</div>
    </div>
    <div class="df">
      <button class="dmute" onclick="muteRule('${batchRule}')">Never ask again</button>
      <span class="bprog">${filled} of ${list.length} filled</span>
      <button class="dpri" ${filled?'':'disabled'} onclick="saveBatch()">Save ${filled||''}</button>
    </div>`;
}
async function findAll(){
  const R=RULES[batchRule];
  const list=live().filter(i=>i.s==='hk'&&i.rule===batchRule&&!batchSkip[i.id]&&!batchVals[i.id]);
  const pool=FOUND[batchRule]||[];
  if(!pool.length||!list.length) return;
  const btn=document.querySelector('.findall');
  if(btn){ btn.classList.add('busy'); btn.querySelector('.fa').textContent='Searching…'; }
  for(let ix=0;ix<list.length;ix++){
    const i=list[ix];
    /* a real look-up won't find everything — pretend a couple come back empty */
    if(ix%7===5){ await wait(90); continue; }
    const val=pool[ix%pool.length];
    const src=SOURCES[ix%SOURCES.length];
    batchVals[i.id]=val;
    batchFound[i.id]={val, src, date:TODAY_STR.toUpperCase()};   // provenance rides with the value
    renderBatch();
    await wait(110);
  }
  const n=Object.keys(batchFound).length;
  toast(`Found ${n} — nothing saved yet. Check them, then save.`);
}

function closeBatch(){ batchRule=null;
  document.getElementById('dscrim').classList.remove('open');
  document.getElementById('drawer').classList.remove('open'); render(); }
function saveBatch(){
  /* NB: values that came from the look-up are saved WITH their source and date,
     so the profile can show "found for you · 8 Jul · agency page" rather than
     passing an unverified fact off as the writer's own. */
  const done=Object.keys(batchVals).filter(k=>batchVals[k]);
  const saved=[];
  done.forEach(k=>{ const it=items.find(x=>x.id==k); if(it){ it.wasToday=it.today; saved.push(it); } });
  items=items.filter(x=>!done.includes(String(x.id)));
  cleared.push(...saved);
  closeBatch();
  toast(`${saved.length} agent${saved.length===1?'':'s'} updated`,()=>{ items.push(...saved); cleared=cleared.filter(c=>!saved.includes(c)); render(); });
}

/* ---------- WALKTHROUGHS (staged) ---------- */
function openWalk(m){
  mode=m;
  const L=live();
  queue = m==='today' ? todayItems().slice() : L.filter(i=>i.s==='do').sort((a,b)=>(b.warn?1:0)-(a.warn?1:0)||a.rank-b.rank);
  if(!queue.length){ toast('Nothing to walk'); return; }
  step=0; staged={}; document.getElementById('scrim').classList.add('open'); renderWalk();
}
function closeScrim(){ document.getElementById('scrim').classList.remove('open'); render(); }
function tryClose(){
  const n=Object.keys(staged).length;
  if(n && !confirm(`You have ${n} unsaved change${n===1?'':'s'}. Discard them?`)) return;
  staged={}; closeScrim();
}
function stageIt(id,a){ staged[id]={a}; step++; renderWalk(); }
function back(){ if(wcap){ wcap=false; renderWalk(); return; } if(step===0)return; step--; delete staged[queue[step].id]; renderWalk(); }
function unstage(id){ delete staged[id]; renderWalk(); }
function renderWalk(){
  const m=document.getElementById('dm'), n=Object.keys(staged).length;
  const TITLE = mode==='today' ? "Today's list" : 'Urgent';

  if(step>=queue.length){
    const rows=Object.entries(staged).map(([id,v])=>{
      const it=queue.find(q=>q.id==id);
      const cls=v.a==='do'?'d':v.a==='snooze'?'s':'k';
      const verb=v.a==='do'?'Done':v.a==='snooze'?'Snoozed':'Left';
      const detail=v.a==='do'&&v.payload?` · ${v.payload.date}${v.payload.method?' · '+v.payload.method:''}`:'';
      return `<div class="sum"><span class="verb ${cls}">${verb}</span>
        <span class="st">${strip(it.t)}<span style="color:var(--faint);font-family:var(--mono);font-size:8.5px">${detail}</span></span>
        <button class="rm" onclick="unstage(${id})">✕</button></div>`;
    }).join('');
    m.innerHTML=`<div class="mh"><div><div class="t">Ready to save</div>
        <div class="s">${n?`${n} change${n===1?'':'s'} — nothing saved yet.`:'You left everything as it was.'}</div></div>
        <button class="x" onclick="tryClose()">✕</button></div>
      <div class="mprog"><i style="width:100%"></i></div>
      <div class="mb">${rows||`<div style="text-align:center;padding:20px">${QUILL}</div>`}</div>
      <div class="mf"><button class="back" onclick="back()">← Back</button><span class="sp"></span>
        <button class="cancel" onclick="tryClose()">Discard</button>
        <button class="btn-pri" onclick="applyWalk()">${n?`Save ${n} change${n===1?'':'s'}`:'Close'}</button></div>`;
    return;
  }

  const it=queue[step], pct=Math.round(step/queue.length*100), prev=staged[it.id];

  /* --- capture sub-step: the SAME form the drawer uses --- */
  if(wcap){
    const isNudge=it.kind==='nudge';
    const ready = !(it.mats||[]).length || wform.mats.some(Boolean);
    m.innerHTML=`<div class="mh"><div><div class="t">${strip(it.t)}</div>
        <div class="s">${isNudge?'What did you send, and when?':'Record what actually went out.'}</div></div>
        <button class="x" onclick="tryClose()">✕</button></div>
      <div class="mprog"><i style="width:${pct}%"></i></div>
      <div class="mb">
        ${it.draft?`<div class="fld"><label class="lb">Suggested note</label>
          <div class="draftbox">${it.draft.replace(/\n/g,'<br>')}</div>
          <button class="copybtn" onclick="toast('Draft copied to clipboard')">⧉ Copy draft</button></div>`:''}
        <div class="frow">
          <div class="fld"><label class="lb">Date ${isNudge?'nudged':'sent'}</label>
            <input type="date" value="${wform.date}" onchange="wform.date=this.value"></div>
          <div class="fld"><label class="lb">How</label>
            <select onchange="wform.method=this.value">
              <option ${wform.method==='Email'?'selected':''}>Email</option>
              <option ${wform.method==='QueryManager'?'selected':''}>QueryManager</option>
              <option ${wform.method==='Agency form'?'selected':''}>Agency form</option>
            </select></div>
        </div>
        ${(it.mats||[]).length?`<div class="fld"><label class="lb">What you included</label>
          ${it.mats.map((mm,ix)=>`<div class="mat ${wform.mats[ix]?'on':''}" onclick="wform.mats[${ix}]=wform.mats[${ix}]?0:1;renderWalk()"><span class="ring"></span>${mm[0]}</div>`).join('')}</div>`:''}
      </div>
      <div class="mf">
        <button class="back" onclick="wcap=false;renderWalk()">← Back</button><span class="sp"></span>
        <button class="btn-pri" ${ready?'':'disabled style="opacity:.4;pointer-events:none"'} onclick="stageDone(${it.id})">
          ${ready?'Stage it →':'Tick what you sent'}</button>
      </div>`;
    return;
  }

  m.innerHTML=`<div class="mh"><div><div class="t">${TITLE}</div>
      <div class="s">Nothing saves until you finish — you can always go back.</div></div>
      <button class="x" onclick="tryClose()">✕</button></div>
    <div class="mprog"><i style="width:${pct}%"></i></div>
    <div class="mb">
      <div class="mstep"><span>${step+1} of ${queue.length}</span>${n?`<span class="pending">${n} pending</span>`:''}</div>
      <div class="mcard"><span class="bigav">${it.ini}</span>
        <div style="flex:1;min-width:0"><div class="n">${it.t}</div><div class="why">${it.why}</div>
          <div class="mdead">${CLOCK} ${it.due}</div></div></div>
      ${prev?`<div class="stagedmsg">✓ Staged: <b>${prev.a==='do'?'done'+(prev.payload?' · '+prev.payload.date:''):prev.a==='snooze'?'snoozed':'left on the board'}</b>. Press Back to change it.</div>`:''}
    </div>
    <div class="mf">
      <button class="back" onclick="back()" ${step===0?'disabled':''}>← Back</button><span class="sp"></span>
      <button class="cancel" onclick="stageIt(${it.id},'skip')">Leave it</button>
      <button class="btn-sec" onclick="stageIt(${it.id},'snooze')">Snooze</button>
      <button class="btn-pri" onclick="openCap(${it.id})">Mark done →</button>
    </div>`;
}
function openCap(id){
  const it=queue.find(q=>q.id===id);
  /* your own tasks have nothing to record — stage straight away */
  if(it.task || it.s==='hk'){ stageIt(id,'do'); return; }
  wform={date:'2026-07-08',method:'Email',mats:(it.mats||[]).map(()=>0)};
  wcap=true; renderWalk();
}
function stageDone(id){
  staged[id]={a:'do',payload:{date:wform.date,method:wform.method,mats:[...wform.mats]}};
  wcap=false; step++; renderWalk();
}
function applyWalk(){
  let n=0;
  Object.entries(staged).forEach(([id,v])=>{
    const it=items.find(x=>x.id==id); if(!it)return;
    if(v.a==='do'){ it.wasToday=it.today; items=items.filter(x=>x.id!=id); cleared.push(it); n++; }
    else if(v.a==='snooze'){ it.snoozes=(it.snoozes||0)+1; items=items.filter(x=>x.id!=id); n++; }
  });
  staged={}; closeScrim(); if(n) toast(`${n} change${n===1?'':'s'} saved`);
}

function toast(msg,undo){
  const t=document.getElementById('toasts'), e=document.createElement('div'); e.className='toast';
  e.innerHTML=`<span>${msg}</span>${undo?'<button class="undo">UNDO</button>':''}`;
  if(undo) e.querySelector('.undo').onclick=()=>{ undo(); e.remove(); };
  t.appendChild(e); setTimeout(()=>e.remove(),3200);
}
render();
</script>
</body>
</html>
