<head>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:radial-gradient(ellipse at 50% 25%, rgba(255,253,249,0.5) 0%, transparent 60%),#EDE6DF;padding:48px 24px 120px;display:flex;flex-direction:column;align-items:center;gap:40px;}
body::before{content:'';position:fixed;inset:0;opacity:0.25;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3CfeComponentTransfer%3E%3CfeFuncA type='linear' slope='0.04'/%3E%3C/feComponentTransfer%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");z-index:1;}
body>*{position:relative;z-index:2;}
.page-title{font-family:'Playfair Display',serif;font-size:24px;font-weight:500;color:#3a1c14;text-align:center;}
.page-title em{font-style:italic;color:#7c3a2a;}
.form-wrap{width:100%;max-width:440px;display:flex;flex-direction:column;gap:10px;}
.form-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:#9c8878;text-align:center;font-weight:500;}
.paper-texture{background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 300 300' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='p'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.04' numOctaves='5' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3CfeComponentTransfer%3E%3CfeFuncA type='linear' slope='0.03'/%3E%3C/feComponentTransfer%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23p)'/%3E%3C/svg%3E");}

.f11{border-radius:14px;overflow:visible;box-shadow:0 1px 2px rgba(58,28,20,0.06),0 6px 24px rgba(58,28,20,0.1);background:#fdfaf5;position:relative;}
.f11::before{content:'';position:absolute;inset:6px;border:1px solid rgba(124,58,42,0.28);border-radius:10px;pointer-events:none;z-index:3;}
.f11-band{background:linear-gradient(135deg,#dce0d9 0%,#d0d6cc 100%);padding:18px 24px 16px;position:relative;overflow:hidden;border-radius:8px 8px 0 0;margin:6px 6px 0;min-height:78px;}
.f11-band::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:rgba(90,110,88,0.2);}

.f11-plane{position:absolute;right:14px;top:50%;transform:translateY(-50%);width:84px;height:84px;pointer-events:none;z-index:1;}

.an-c{display:flex;align-items:center;gap:11px;position:relative;z-index:2;}
.an-c-avatar{width:38px;height:38px;border-radius:50%;background:#fdfaf5;border:1px solid rgba(124,58,42,0.25);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:14px;font-weight:500;color:#7c3a2a;flex-shrink:0;box-shadow:0 1px 2px rgba(58,28,20,0.05);}
.an-c-pre{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.08em;text-transform:uppercase;color:#5a6e58;margin-bottom:1px;}
.an-c-name{font-family:'Playfair Display',serif;font-size:18px;font-weight:500;color:#2e3a2c;line-height:1.1;}
.an-c-agency{font-size:11px;color:#6a7e68;font-weight:300;margin-top:1px;}

.f11-body{padding:20px 22px 22px;position:relative;margin:0 6px 6px;}
.f11 label{font-family:'JetBrains Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.07em;color:#9c8878;margin-bottom:5px;display:block;}
.f11 input[type=text]{width:100%;background:#ffffff;border:0.5px solid #e0d5c8;border-radius:9px;padding:10px 13px;font-family:'Inter',sans-serif;font-size:13px;color:#3a1c14;outline:none;margin-bottom:14px;transition:all 0.2s;box-shadow:inset 0 1px 2px rgba(58,28,20,0.03);}
.f11 input[type=text]:focus{border-color:#8a9e88;box-shadow:0 0 0 3px rgba(138,158,136,0.12),inset 0 1px 2px rgba(58,28,20,0.03);}
.f11 input::placeholder{color:#c8b8a8;}

/* shared trigger style for dropdown + datepicker */
.field-trigger{width:100%;background:#ffffff;border:0.5px solid #e0d5c8;border-radius:9px;padding:10px 13px;font-family:'Inter',sans-serif;font-size:13px;color:#3a1c14;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:8px;transition:all 0.2s;box-shadow:inset 0 1px 2px rgba(58,28,20,0.03);margin-bottom:14px;}
.field-trigger:hover{border-color:#c9a89e;}
.dd.open .field-trigger,.dp.open .field-trigger{border-color:#8a9e88;box-shadow:0 0 0 3px rgba(138,158,136,0.12),inset 0 1px 2px rgba(58,28,20,0.03);}
.tg-icon{color:#7c3a2a;flex-shrink:0;transition:transform 0.2s;}
.dd.open .tg-chevron{transform:rotate(180deg);}

/* Dropdown */
.dd{position:relative;}
.dd-menu{position:absolute;top:calc(100% - 4px);left:0;right:0;background:#fdfaf5;border:0.5px solid #e0d5c8;border-radius:10px;box-shadow:0 6px 20px rgba(58,28,20,0.14);padding:5px;z-index:30;display:none;animation:popIn 0.15s ease;}
.dd.open .dd-menu{display:block;}
@keyframes popIn{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);}}
.dd-opt{padding:9px 12px;border-radius:7px;font-size:13px;color:#3a1c14;cursor:pointer;transition:background 0.14s,color 0.14s;display:flex;align-items:center;justify-content:space-between;}
.dd-opt:hover{background:#fff;color:#7c3a2a;}
.dd-opt.sel{background:#f5e2da;color:#7c3a2a;font-weight:500;}
.dd-opt .tick{opacity:0;color:#7c3a2a;}
.dd-opt.sel .tick{opacity:1;}

/* Date picker */
.dp{position:relative;}
.dp-pop{position:absolute;top:calc(100% - 4px);left:0;background:#fdfaf5;border:0.5px solid #e0d5c8;border-radius:12px;box-shadow:0 8px 24px rgba(58,28,20,0.16);padding:14px;z-index:30;display:none;width:280px;animation:popIn 0.15s ease;}
.dp.open .dp-pop{display:block;}
.dp-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.dp-month{font-family:'Playfair Display',serif;font-size:15px;font-weight:500;color:#3a1c14;}
.dp-nav{display:flex;gap:4px;}
.dp-navbtn{width:26px;height:26px;border-radius:7px;border:0.5px solid #e0d5c8;background:#fff;color:#7c3a2a;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s;}
.dp-navbtn:hover{background:#f5e2da;border-color:#d8a89a;}
.dp-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.dp-dow{font-family:'JetBrains Mono',monospace;font-size:9px;color:#9c8878;text-align:center;padding:4px 0;letter-spacing:0.03em;}
.dp-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:12px;color:#3a1c14;cursor:pointer;border-radius:7px;transition:all 0.13s;font-family:'Inter',sans-serif;}
.dp-day:hover{background:#f5e2da;color:#7c3a2a;}
.dp-day.muted{color:#cbbcae;cursor:default;}
.dp-day.muted:hover{background:transparent;color:#cbbcae;}
.dp-day.today{font-weight:600;color:#5a6e58;box-shadow:inset 0 0 0 1px #b8c8b0;}
.dp-day.sel{background:#7c3a2a;color:#f5ede8;font-weight:500;}
.dp-day.sel:hover{background:#5a2a1e;color:#f5ede8;}

.btn-row{display:flex;justify-content:center;margin-top:4px;}
.b-soft-burg{cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;letter-spacing:0.07em;background:#f5e2da;color:#7c3a2a;border:0.5px solid #e8c8bc;border-radius:10px;padding:11px 28px;transition:all 0.2s;}
.b-soft-burg:hover{background:#efd5ca;border-color:#d8a89a;}
</style>

<div class="page-title">Log a query — <em>final form</em></div>

<div class="form-wrap">
  <div class="form-label">Form 11 · clean line plane · fully on-brand fields</div>
  <div class="f11 paper-texture">
    <div class="f11-band">
      <!-- Clean recognisable paper plane (proven send-icon geometry) + motion -->

  </div>
</div>

<script>
// ── Dropdown ──
function toggleDd(id){
  var el=document.getElementById(id);var was=el.classList.contains('open');
  closeAll();if(!was)el.classList.add('open');
}
function pickDd(id,opt){
  var el=document.getElementById(id);
  el.querySelectorAll('.dd-opt').forEach(function(o){o.classList.remove('sel');});
  opt.classList.add('sel');
  document.getElementById(id+'-val').textContent=opt.textContent.replace('✓','').trim();
  el.classList.remove('open');
}

// ── Date picker ──
var MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
var dpState={dp1:{view:new Date(2026,5,1),sel:new Date(2026,5,10)}};
var TODAY=new Date(2026,5,10);

function toggleDp(id){
  var el=document.getElementById(id);var was=el.classList.contains('open');
  closeAll();if(!was){el.classList.add('open');renderDp(id);}
}
function dpNav(id,delta){
  dpState[id].view.setMonth(dpState[id].view.getMonth()+delta);
  renderDp(id);
}
function renderDp(id){
  var st=dpState[id];var v=st.view;
  document.getElementById(id+'-month').textContent=MONTHS[v.getMonth()]+' '+v.getFullYear();
  var grid=document.getElementById(id+'-days');grid.innerHTML='';
  var first=new Date(v.getFullYear(),v.getMonth(),1);
  var startDow=(first.getDay()+6)%7; // Mon=0
  var daysInMonth=new Date(v.getFullYear(),v.getMonth()+1,0).getDate();
  var prevDays=new Date(v.getFullYear(),v.getMonth(),0).getDate();
  for(var i=0;i<startDow;i++){
    var d=document.createElement('div');d.className='dp-day muted';d.textContent=prevDays-startDow+i+1;grid.appendChild(d);
  }
  for(var day=1;day<=daysInMonth;day++){
    var cell=document.createElement('div');cell.className='dp-day';cell.textContent=day;
    var thisDate=new Date(v.getFullYear(),v.getMonth(),day);
    if(sameDay(thisDate,TODAY))cell.classList.add('today');
    if(sameDay(thisDate,st.sel))cell.classList.add('sel');
    (function(dd){cell.onclick=function(){selectDp(id,dd);};})(thisDate);
    grid.appendChild(cell);
  }
}
function selectDp(id,date){
  dpState[id].sel=date;
  var lbl=date.getDate()+' '+MONTHS[date.getMonth()]+' '+date.getFullYear();
  document.getElementById(id+'-val').textContent=lbl;
  document.getElementById(id).classList.remove('open');
}
function sameDay(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();}

function closeAll(){document.querySelectorAll('.dd,.dp').forEach(function(d){d.classList.remove('open');});}
document.addEventListener('click',function(e){if(!e.target.closest('.dd')&&!e.target.closest('.dp'))closeAll();});
</script>
